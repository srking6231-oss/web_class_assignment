<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <label for="username">Username</label><br>
        <input class="text" type="text" name="username" id="username" placeholder="Enter username"><br><br>
        <label for="password">Password</label><br>
        <input class="text" type="password" name="password" id="password" placeholder="Enter password"><br>
        <small>Password is between 4 and 12 characters</small> <br><br>
        <div class="input-group">
        <input class="error" type="text" required>
        <span class="error-icon">!</span>
        </div>
        <label class="error-message">Error message informing me of a problem</label></div>
        <br><br>
        <input type="checkbox" name="remember" id="remember">
        <label for="remember">Remember me</label><br><br>
    
        <div class="switch-container">
        <label class="switch">
        <input type="checkbox">
        <span class="slider"></span>
        </label>
        <span class="label">Off</span>
        </div>
        <br>
        <input type="radio" name="selection1" id="selection1">
        <label for="selection1">Radio Selection 1</label><br><br>
        <input type="radio" name="selection2" id="selection2">
        <label for="selection2">Radio Selection 2</label><br><br>
        <input type="radio" name="selection3" id="selection3">
        <label for="selection3">Radio Selection 3</label><br><br>
        <label for="dropdown">Dropdown Title</label><br>
        <select name="dropdown" id="dropdown">
            <option class="option" value="option1">Dropdown option</option>
            <option class="option" value="option2">Dropdown option 1</option>
            <option class="option" value="option3">Dropdown option 2</option>
        </select><br><br><br><br><br><br>
        <div class="button-group"><input class="cancel" type="button" value="Cancel">
        <input class="submit" type="submit" value="Next"></div>

 
        

    </form>
</body>
</html>
